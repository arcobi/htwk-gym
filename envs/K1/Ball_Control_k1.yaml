basic:
  checkpoint: null # set to -1 to load last saved model
  headless: true
  max_iterations: 10000 # set the maximum number of learning iterations to train for
  sim_device: "cuda:0" # device for physics simulation
  rl_device: "cuda:0" # device for the RL algorithm
  seed: -1 # seed - set to -1 to choose random seed
  description: ""
  debug_feet_offset: false # enable debug print for feet_x_offset in play mode
  debug_termination: false # print termination reasons in _check_termination
  debug_termination_interval: 1 # print every N sim steps when any reset is triggered
  debug_termination_max_envs: 5 # max env ids to print per termination sample
  enable_csv_logging: true
  task: "K1/BallControlK1"

env:
  num_envs: 4096
  num_observations: 39
  num_privileged_obs: 14
  num_actions: 13
  env_spacing: 3.  # not used with plane terrain
  intercept_feature_history_len: 2  # kept for optional future experiments; not part of current policy input

runner:
  horizon_length: 48
  mini_epochs: 10
  save_interval: 1000
  use_wandb: true
  log_video_interval: 500  # Log video to wandb every N iterations (defaults to save_interval if not specified)
  log_video_duration: 15.  # Duration of video clip in seconds
  training_curriculum:
    enabled: true
    phase1_end: 1500
    phase2_end: 3500
    phase3_end: 5000
    phase1_locomotion: 1.0
    phase1_approach: 1.25
    phase1_failure: 0.75
    phase1_intercept: 0.20
    phase1_control: 0.0
    phase2_locomotion: 1.0
    phase2_approach: 1.0
    phase2_failure: 1.0
    phase2_intercept: 1.0
    phase2_control: 0.5
    phase3_locomotion: 1.0
    phase3_approach: 1.0
    phase3_failure: 1.0
    phase3_intercept: 1.0
    phase3_control: 1.0

viewer:
  pos: [3., -3., 2.]  # [m]
  lookat: [0., 0., 0.]  # [m]
  record_video: true  # only in play
  record_interval: 60  # [s]
  record_env_idx: 0
  

algorithm:
  learning_rate: 5.e-6
  gamma: 0.995
  lam: 0.95
  bound_coef: 1.0
  entropy_coef: -0.01
  symmetric_coef: 10.
  desired_kl: 0.02
  value_clip_param: 0.2
  min_entropy: -18
  max_entropy: -5.0

sim:
  dt: 0.002
  substeps: 1
  up_axis: "z"
  gravity: [0.0, 0.0, -9.81]
  physics_engine: "physx" # "physx" or "flex"
  physx:
    num_threads: 4 # Number of worker threads per scene used by PhysX - for CPU PhysX only.
    solver_type: 1 # 0: pgs, 1: tgs
    num_position_iterations: 4
    num_velocity_iterations: 1
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 100.0
    default_buffer_size_multiplier: 5.0
    max_gpu_contact_pairs: 8388608 # 8*1024*1024
    num_subscenes: 4 # Splits the simulation into N physics scenes and runs each one in a separate thread
    contact_collection: 1 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)

asset:
  file: "resources/K1/K1_locomotion.urdf"
  name: "K1"
  base_name: "Trunk"
  foot_names: ["left_foot_link", "right_foot_link"]
  disable_gravity: false
  default_dof_drive_mode: 3 # see GymDofDriveModeFlags (0 is none, 1 is pos tgt, 2 is vel tgt, 3 effort)
  collapse_fixed_joints: true # bug: if collapse_fixed_joints = false, foot doesn't collide with ground
  fix_base_link: false # fix the base of the robot
  self_collisions: 0 # 1 to disable, 0 to enable...bitwise filter
  replace_cylinder_with_capsule: false # replace collision cylinders with capsules, leads to faster/more stable simulation
  flip_visual_attachments: false # Some .obj meshes must be flipped from y-up to z-up
  density: 0.001
  angular_damping: 0.
  linear_damping: 0.
  max_angular_velocity: 1000.
  max_linear_velocity: 1000.
  armature: 0.
  thickness: 0.01
  feet_edge_pos: [[ 0.1215,  0.05, -0.03],
                  [ 0.1215, -0.05, -0.03],
                  [-0.1015,  0.05, -0.03],
                  [-0.1015, -0.05, -0.03]] # x,y,z [m]

ball:
  name: "ball"
  radius: 0.05 # Ball radius in meters
  mass: 0.16 # Ball mass in kg
  init_pos: [0.3, 0.0, 0.06]  # Initial position of the ball
  init_rot: [0.0, 0.0, 0.0, 1.0]  # Initial rotation (quaternion)
  init_lin_vel: [0.0, 0.0, 0.0]  # Initial linear velocity
  init_ang_vel: [0.0, 0.0, 0.0]  # Initial angular velocity
  restitution: 0.1  # Bounciness
  friction: 1.0  # Custom friction coefficient
  rolling_friction: 0.3  # Custom rolling friction coefficient
  torsion_friction: 0.1
  density: 200
  spawn_radius: 2  # Maximum distance from robot to place the ball at reset
  detection_fps: 30.0  # Simulated camera FPS for ball detection
  detection_fps_jitter: 0.15  # Randomization of detection timing (±15%)
  perception_lag_min_s: 0.08  # Randomized past snapshot lag lower bound
  perception_lag_max_s: 0.18  # Randomized past snapshot lag upper bound
  detection_age_clip_s: 0.25  # Clip for detection-age observation

init_state:
  pos: [0.0, 0.0, 0.58] # x,y,z [m]
  rot: [0.0, 0.0, 0.0, 1.0] # x,y,z,w [quat]
  lin_vel: [0.0, 0.0, 0.0]  # x,y,z [m/s]
  ang_vel: [0.0, 0.0, 0.0]  # x,y,z [rad/s]
  ball_pos: [0.5, 0.0, 0.11]  # x,y,z [m]
  default_joint_angles: {"Hip_Pitch": -0.2, "Knee_Pitch": 0.4, "Ankle_Pitch": -0.25, "default": 0.} # target angles when action = 0.0

control:
  stiffness: {"Hip": 100., "Knee": 100., "Ankle": 50.} # [N*m/rad]
  damping: {"Hip": 2., "Knee": 2., "Ankle": 1.} # [N*m*s/rad]
  action_scale: 1.
  decimation: 10

terrain:
  type: "plane" # "plane" or "trimesh"
  static_friction: 1.0  # [-]
  dynamic_friction: 1.0  # [-]
  restitution: 0.        # [-]
  # trimesh only:
  terrain_length: 10.
  terrain_width: 10.
  border_size: 5.
  num_terrains: 8
  terrain_proportions: [0.0, 0.0, 0.5, 0.5] # terrain types: [plane, slope, random, discrete]
  slope: 0.1
  random_height: 0.1
  discrete_height: 0.02
  horizontal_scale: 0.1
  vertical_scale: 0.005
  slope_threshold: 2.0

commands:
  num_commands: 10                     # x, y, yaw, freq, yawL, yawR, pitch, roll, offset_x, offset_y
  command_order: [lin_vel_x, lin_vel_y, ang_vel_yaw, gait_frequency,
                  foot_yaw_L, foot_yaw_R, body_pitch_target, body_roll_target, feet_offset_x_target, feet_offset_y_target]
  still_proportion: 0.1
  lin_vel_x: [-1.0, 1.0] # min max [m/s]
  lin_vel_y: [-1.0, 1.0] # min max [m/s]
  ang_vel_yaw: [-1.6, 1.6]   # min max [rad/s]
  gait_frequency: [1.5, 1.5] # min max [Hz]
  
  # Additional parameters for foot and body control
  foot_yaw_L:         [-0.7,  0.7]     # [rad]
  foot_yaw_R:         [-0.7,  0.7]     # [rad]
  body_pitch_target:  [-0.1,  0.3]     # [rad], 0 = upright, ±0.3 ≈ ±17°
  body_roll_target:   [-0.1,  0.1]     # [rad], 0 = upright, ±0.2 ≈ ±11°
  feet_offset_x_target: [-0.15, 0.15]    # [m], target x-offset between feet during swing phases
  feet_offset_y_target: [-0.08, 0.15]    # [m], target y-offset between feet during swing phases
  
  resampling_time_s: [3., 8.]
  # curriculum only:
  curriculum: false
  update_rate: 0.1
  lin_vel_levels: 10
  ang_vel_levels: 10
  lin_vel_x_resolution: 0.2 # [m/s]
  lin_vel_y_resolution: 0.1 # [m/s]
  ang_vel_resolution: 0.2 # [rad/s]
  episode_length_toler: 0.1
  lin_vel_x_toler: 0.4 # [m/s]
  lin_vel_y_toler: 0.2 # [m/s]
  ang_vel_yaw_toler: 0.2 # [rad/s]

normalization:
  gravity: 1.0
  lin_vel: 1.0
  ang_vel: 1.0
  gait_frequency: 1.0
  foot_yaw: 1.0
  body_pitch_target: 1.0          # [rad] stays in rad
  body_roll_target:  1.0          # [rad] stays in rad
  feet_offset_x_target: 1.0       # [m] stays in meters
  feet_offset_y_target: 1.0       # [m] stays in meters
  dof_pos: 1.0
  dof_vel: 0.1
  filter_weight: 0.1
  push_force: 0.1
  push_torque: 0.5
  clip_actions: 1.
  ball_pos: 0.33333333333  # Normalize ball position (1/3m scale)
  ball_vel: 1.0
  ball_detection_age: 4.0
  ball_target_vel: 1.0  # No scaling needed for ball target velocity
  gait_frequency_offset: 1.0
  intercept_time: 1.5

noise:
  gravity:
    range: [0., 0.01]
    operation: "additive"
    distribution: "gaussian"
  lin_vel:
    range: [0., 0.05]
    operation: "additive"
    distribution: "gaussian"
  ang_vel:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  dof_pos:
    range: [0., 0.01]
    operation: "additive"
    distribution: "gaussian"
  dof_vel:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  height:
    range: [0., 0.02]
    operation: "additive"
    distribution: "gaussian"
  ball_pos:
    range: [-0.03, 0.03]
    operation: "additive"
    distribution: "gaussian"
  ball_vel:
    range: [-0.03, 0.03]
    operation: "additive"
    distribution: "gaussian"

randomization:
  init_dof_pos:
    range: [0., 0.05]
    operation: "additive"
    distribution: "gaussian"
  init_base_pos_xy:
    range: [-1., 1.]
    operation: "additive"
    distribution: "uniform"
  init_base_lin_vel_xy:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  init_base_ang:
    range: [-0.1, 0.1]
    operation: "additive"
    distribution: "gaussian"

  ball_radius:
    range: [-0.01, 0.01]
    operation: "additive"
    distribution: "uniform"
  ball_mass:
    range: [-0.02, 0.02]
    operation: "additive"
    distribution: "uniform"
  ball_init_pos_x:
    range: [0, 4]
    operation: "additive"
    distribution: "uniform"
  ball_init_pos_y:
    range: [-4, 4]
    operation: "additive"
    distribution: "uniform"
  ball_target_speed:
    range: [0.8, 1.8]
    operation: "additive"
    distribution: "uniform"
  ball_restitution:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  ball_friction:
    range: [0.9, 1.1]
    operation: "scaling"
    distribution: "uniform"
  ball_rolling_friction:
    range: [0.9, 1.1]
    operation: "scaling"
    distribution: "uniform"
  ball_torsion_friction:
    range: [0.9, 1.1]
    operation: "scaling"
    distribution: "uniform"
  ball_density:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  ball_tolerance:
    range: [-0.3, 0.3]
    operation: "additive"
    distribution: "uniform"
  ball_init_ang_vel_x:
    range: [-1.0, 1.0]
    operation: "additive"
    distribution: "uniform"
  ball_init_ang_vel_y:
    range: [-1.0, 1.0]
    operation: "additive"
    distribution: "uniform"
  ball_init_ang_vel_z:
    range: [-1.0, 1.0]
    operation: "additive"
    distribution: "uniform"

  kick_interval_s:
    range: [1., 4.]
    operation: "additive"
    distribution: "uniform"
  kick_lin_vel:
    range: [0.1, 0.3]
    operation: "additive"
    distribution: "gaussian"
  kick_ang_vel:
    range: [0.02, 0.08]
    operation: "additive"
    distribution: "gaussian"

  push_interval_s:
    range: [2., 5.]
    operation: "additive"
    distribution: "uniform"
  push_duration_s: 1.
  push_force:
    range: [5, 30.]
    operation: "additive"
    distribution: "gaussian"
  push_torque:
    range: [1., 4.]
    operation: "additive"
    distribution: "gaussian"

  dof_stiffness:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  dof_damping:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  dof_friction:
    range: [0.0, 2.0]
    operation: "additive"
    distribution: "uniform"

  friction:
    range: [0.1, 2.0]
    operation: "additive"
    distribution: "uniform"
  compliance:
    range: [0.5, 1.5]
    operation: "additive"
    distribution: "uniform"
  restitution:
    range: [0.1, 0.9]
    operation: "additive"
    distribution: "uniform"

  base_com:
    range: [-0.1, 0.1]
    operation: "additive"
    distribution: "uniform"
  base_mass:
    range: [0.8, 1.2]
    operation: "scaling"
    distribution: "uniform"
  other_com:
    range: [-0.005, 0.005]
    operation: "additive"
    distribution: "uniform"
  other_mass:
    range: [0.98, 1.02]
    operation: "scaling"
    distribution: "uniform"

ball_curriculum:
  enabled: true
  advance_threshold: 0.6
  retreat_threshold: 0.3
  evaluation_window: 200
  num_levels: 4
  distance_min: [1.0, 1.4, 1.8, 2.2]
  distance_max: [1.8, 2.3, 2.9, 3.5]
  speed_min:    [0.6, 0.8, 1.0, 1.2]
  speed_max:    [1.0, 1.4, 1.9, 2.5]
  tolerance:    [0.10, 0.20, 0.35, 0.60]
  y_range:      [0.35, 0.70, 1.20, 2.00]

rewards:
  scales:
    # === Simplified core reward set ===
    # Keep a small set of rewards active. Any scale set to 0.0 is removed automatically.
    survival: 0.25
    base_height: -25.
    height_margin: 0.0
    torques: 0.0
    torque_tiredness: 0.0
    power: 0.0
    lin_vel_z: 0.0
    dof_vel: 0.0
    dof_acc: 0.0
    root_acc: 0.0
    action_rate: -1.4
    dof_pos_limits: 0.0
    dof_vel_limits: 0.0
    torque_limits: 0.0
    collision: -1.
    feet_slip: 0.0
    feet_swing: 2.
    upright_posture: 1.0
    standing_stability: 0.0
    approach_progress: 2.0
    ball_distance_penalty: 0.0
    ball_velocity_tracking: 0.0
    shot_path_alignment: 0.0
    perceived_intercept_timing: 0.0
    incoming_source_position: 0.0
    intercept_arrival_timing: 2.5
    look_at_ball: 0.0
    receive_zone_control: 0.0
    ball_stop_near_start: 0.0
    ball_passed_behind_penalty: -2.5
    interception_time_bonus: 10.0
    ball_speed_reduction: 4.0
    foot_ball_proximity: 0.0
    ball_in_front_after_stop: 3.0
    ball_travel_penalty: -2.5
  
  episode_length_s: 10.
  terminate_height: 0.35
  terminate_lin_vel: 5.0  # [m/s] terminate if ||base linear vel|| exceeds this
  terminate_ang_vel: 20.0  # [rad/s] terminate if ||base angular vel|| exceeds this
  terminate_vel: 70.  # legacy fallback (used only if terminate_lin_vel/terminate_ang_vel are missing)
  terminate_contacts_on: []
  penalize_contacts_on: ["Trunk", "H1", "H2", "AL", "AR", "Waist", "Hip", "Shank", "Ankle"]
  only_positive_rewards: false # if true negative total rewards are clipped at zero (avoids early termination problems)
  tracking_sigma: 0.25 # tracking reward = exp(-error^2/sigma)
  height_margin_sigma: 0.075  # [m] exponential decay width for height_margin reward
  base_height_target: 0.54
  soft_dof_pos_limit: 1. # percentage of urdf limits, values above this limit are penalized
  soft_dof_vel_limit: 1.
  soft_torque_limit: 1.
  swing_period: 0.2
  feet_distance_ref: 0.18
  upright_sigma: 0.10
  standing_lin_vel_sigma: 0.35
  standing_ang_vel_sigma: 1.0
  approach_progress_clip: 0.03
  receive_dist_sigma: 0.20
  receive_speed_sigma: 0.12
  stability_gate_height: 0.46
  stability_gate_sigma: 0.03
  # Ball-related reward parameters
  ball_vel_tracking_sigma: 1.0  # Sigma for velocity tracking reward
  ball_vel_tracking_min_speed: 0.1  # Minimum ball speed for tracking reward
  ball_vel_tracking_stop_sigma: 0.5  # Sigma for zero-target stopping reward (smaller = stronger stop pressure)
  ball_stop_control_distance: 0.45  # [m] stop reward is gated by robot-ball distance beyond this threshold
  ball_stop_control_distance_sigma: 0.15  # [m] smoothness for stop-reward distance gate
  ball_receive_intercept_offset: 0.25  # [m] for zero-target+moving-ball, stand this far ahead of ball velocity
  ball_stop_near_start_sigma: 0.7  # [m^2-like scale] closeness sensitivity to robot start point
  ball_stop_near_start_speed_sigma: 0.2  # [m/s] smaller = only rewards near-zero ball speed
  ball_distance_sigma: 3.0  # Sigma for distance penalty
  ball_still_speed_threshold: 0.05  # [m/s] below this XY speed counts as "ball still"
  ball_still_termination_s: 4.0  # [s] terminate episode if ball stays still this long
  clear_miss_termination_s: 0.35  # [s] terminate once the ball clearly passed and keeps moving away
  max_ball_distance: 5.0  # Reset if ball goes >5m from robot
  look_at_ball_sigma: 0.5  # Sigma for look-at-ball reward (smaller = stricter)
  shot_path_lateral_sigma: 0.10
  shot_path_forward_min: 0.05
  shot_path_forward_sigma: 0.08
  perceived_intercept_lateral_sigma: 0.12
  perceived_intercept_forward_min: 0.05
  perceived_intercept_forward_sigma: 0.08
  perceived_intercept_min_delta: 0.01
  incoming_source_lateral_sigma: 0.10
  incoming_source_forward_min: 0.05
  incoming_source_forward_sigma: 0.08
  intercept_window_time_s: 0.35
  intercept_time_clip_s: 3.0
  intercept_approach_min_speed: 0.08
  intercept_speed_sigma: 0.08
  intercept_arrival_tti_target: 0.18
  intercept_arrival_tti_sigma: 0.12
  intercept_arrival_lateral_sigma: 0.10
  intercept_arrival_forward_min: 0.04
  intercept_arrival_forward_sigma: 0.08
  miss_moving_away_min: 0.03
  ball_passed_margin_x: 0.03
  ball_passed_depth_cap: 0.50
  ball_passed_speed_threshold: 0.06
  ball_passed_speed_sigma: 0.04
  ball_passed_away_min: 0.04
  ball_passed_away_sigma: 0.10
  ball_passed_lateral_sigma: 0.25
  receive_mode_target_speed_eps: 1.0e-6
  receive_front_min_x: 0.02
  receive_front_sigma: 0.08
  receive_lateral_sigma: 0.12
  # Interception time bonus parameters
  interception_min_speed_drop: 0.05    # [m/s] per step threshold (natural friction ~0.02)
  interception_foot_radius: 0.20       # [m] foot-to-ball proximity for contact detection
  interception_time_tau: 2.0           # [s] time decay constant for one-shot bonus
  # Ball speed reduction parameters
  ball_speed_reduction_min_delta: 0.08 # [m/s] above natural friction per step
  ball_speed_reduction_proximity_sigma: 0.10  # [m^2] foot proximity gate
  # Foot-ball proximity parameters
  foot_ball_proximity_sigma: 0.15      # [m^2] reward proximity sigma
  # Ball in front parameters
  ball_in_front_dist_sigma: 0.30       # [m^2] distance gate
  ball_in_front_lateral_sigma: 0.12    # [m^2] lateral gate
  ball_in_front_speed_sigma: 0.30      # [m/s] speed gate
  # Time decay for existing ball-stop rewards
  ball_reward_time_decay_tau: 3.0      # [s] decay constant
  # Ball travel penalty
  ball_travel_penalty_max: 5.0         # [m] normalisation cap
