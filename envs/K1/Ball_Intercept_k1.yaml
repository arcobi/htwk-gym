basic:
  checkpoint: null # set to -1 to load last saved model
  headless: true
  max_iterations: 10000 # set the maximum number of learning iterations to train for
  sim_device: "cuda:0" # device for physics simulation
  rl_device: "cuda:0" # device for the RL algorithm
  seed: 42 # seed - set to -1 to choose random seed
  description: ""
  enable_csv_logging: false

env:
  num_envs: 2048
  num_observations: 48  # Added ball velocity (vx, vy)
  num_privileged_obs: 20
  num_actions: 12
  env_spacing: 5.  # not used with plane terrain

# Goalkeeper settings
goalkeeper:
  ball_passed_x_threshold: -0.5    # Ball passed robot if behind this threshold

runner:
  horizon_length: 24
  mini_epochs: 20
  save_interval: 500
  use_wandb: true
  
  # Curriculum settings for phased training (optional)
  # Phase 1 (0-2000): Focus on blocking + stability (reduce strike rewards)
  # Phase 2 (2000-5000): Introduce strike rewards gradually  
  # Phase 3 (5000+): Full task with all rewards
  curriculum_enabled: false  # Set to true to enable phased training
  curriculum_phases:
    - epoch: 0
      reward_scales:
        directional_return: 2.0  # Reduced initially
        ball_forward_vel: 1.0
        ball_shot_back: 20.0
    - epoch: 2000
      reward_scales:
        directional_return: 5.0  # Increase
        ball_forward_vel: 3.0
        ball_shot_back: 35.0
    - epoch: 5000
      reward_scales:
        directional_return: 8.0  # Full
        ball_forward_vel: 5.0
        ball_shot_back: 50.0

viewer:
  pos: [3., -3., 2.]  # [m]
  lookat: [15., 0., 0.]  # [m]
  record_video: true  # only in play
  record_interval: 5.  # [s]
  record_env_idx: 0

algorithm:
  learning_rate: 1.e-5
  gamma: 0.995
  lam: 0.95
  bound_coef: 1.0
  entropy_coef: -0.01
  symmetric_coef: 10.
  desired_kl: 0.01
  min_entropy: null
  max_entropy: null

sim:
  dt: 0.002
  substeps: 1
  up_axis: "z"
  gravity: [0.0, 0.0, -9.81]
  physics_engine: "physx" # "physx" or "flex"
  physx:
    num_threads: 4 # Number of worker threads per scene used by PhysX - for CPU PhysX only.
    solver_type: 1 # 0: pgs, 1: tgs
    num_position_iterations: 8  # from IsaacLab K1 config
    num_velocity_iterations: 4  # from IsaacLab K1 config
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1.0  # from IsaacLab K1 config
    default_buffer_size_multiplier: 5.0
    max_gpu_contact_pairs: 8388608 # 8*1024*1024
    num_subscenes: 8 # Splits the simulation into N physics scenes and runs each one in a separate thread
    contact_collection: 1 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)

asset:
  file: "resources/K1/K1_locomotion.urdf"
  mujoco_file: "resources/K1/K1_locomotion.xml"
  name: "K1"
  base_name: "Trunk"
  foot_names: ["left_foot_link", "right_foot_link"]
  disable_gravity: false
  default_dof_drive_mode: 3 # see GymDofDriveModeFlags (0 is none, 1 is pos tgt, 2 is vel tgt, 3 effort)
  collapse_fixed_joints: true # bug: if collapse_fixed_joints = false, foot doesn't collide with ground
  fix_base_link: false # fix the base of the robot
  self_collisions: 0 # 1 to disable, 0 to enable...bitwise filter
  replace_cylinder_with_capsule: false # replace collision cylinders with capsules, leads to faster/more stable simulation
  flip_visual_attachments: false # Some .obj meshes must be flipped from y-up to z-up
  density: 0.001
  angular_damping: 0.
  linear_damping: 0.
  max_angular_velocity: 1000.
  max_linear_velocity: 1000.
  armature: 0.
  thickness: 0.01
  feet_edge_pos: [[ 0.11,  0.04, -0.02],
                  [ 0.11, -0.04, -0.02],
                  [-0.07,  0.04, -0.02],
                  [-0.07, -0.04, -0.02]] # x,y,z [m]

ball:
  name: "ball"
  radius: 0.11  # Ball radius in meters (from old URDF)
  mass: 0.4      # Ball mass in kg (from old URDF)
  init_pos: [0.3, 0.0, 0.06]  # Initial position of the ball
  init_rot: [0.0, 0.0, 0.0, 1.0]  # Initial rotation (quaternion)
  init_lin_vel: [0.0, 0.0, 0.0]  # Initial linear velocity
  init_ang_vel: [0.0, 0.0, 0.0]  # Initial angular velocity
  restitution: 0.0  # Bounciness
  friction: 1.0  # Custom friction coefficient (applied manually)
  rolling_friction: 1.0  # Custom rolling friction coefficient (applied manually)
  density: 0.001
  spawn_radius: 1  # Maximum distance from robot to place the ball at reset

init_state:
  pos: [0.0, 0.0, 0.72] # x,y,z [m]
  rot: [0.0, 0.0, 0.0, 1.0] # x,y,z,w [quat]
  lin_vel: [0.0, 0.0, 0.0]  # x,y,z [m/s]
  ang_vel: [0.0, 0.0, 0.0]  # x,y,z [rad/s]
  ball_pos: [0.5, 0.0, 0.05]  # x,y,z [m]
  default_joint_angles: {"Hip_Pitch": -0.2, "Knee_Pitch": 0.4, "Ankle_Pitch": -0.25, "default": 0.} # target angles when action = 0.0

control:
  stiffness: {"Hip": 80., "Knee": 80., "Ankle": 35., "Default": 10} # [N*m/rad]
  damping: {"Hip": 4, "Knee": 4, "Ankle": 1, "Default": 1} # [N*m*s/rad]
  armature: {"Hip_Pitch": 0.0478125, "Hip_Roll": 0.0339552, "Hip_Yaw": 0.0282528, "Knee": 0.095625, "Ankle": 0.0565056} # from IsaacLab K1 config
  effort_limit: {"Hip_Pitch": 30., "Hip_Roll": 35., "Hip_Yaw": 20., "Knee": 40., "Ankle": 20.} # [N*m] - from IsaacLab K1 config
  velocity_limit: {"Hip_Pitch": 8., "Hip_Roll": 12.9, "Hip_Yaw": 18., "Knee": 12.5, "Ankle": 18.} # [rad/s] - from IsaacLab K1 config
  action_scale: 1.
  decimation: 10

terrain:
  type: "plane" # "plane" or "trimesh"
  static_friction: 1.0  # [-]
  dynamic_friction: 1.0  # [-]
  restitution: 0.        # [-]
  # trimesh only:
  terrain_length: 10.
  terrain_width: 10.
  border_size: 5.
  num_terrains: 8
  terrain_proportions: [0.0, 0.0, 0.5, 0.5] # terrain types: [plane, slope, random, discrete]
  slope: 0.1
  random_height: 0.1
  discrete_height: 0.02
  horizontal_scale: 0.1
  vertical_scale: 0.005
  slope_threshold: 2.0

commands:
  num_commands: 0 # default: lin_vel_x, lin_vel_y, ang_vel_yaw
  still_proportion: 0.1
  lin_vel_x_resolution: 0.2 # [m/s]
  lin_vel_y_resolution: 0.1 # [m/s]
  ang_vel_resolution: 0.2 # [rad/s]
  episode_length_toler: 0.1
  lin_vel_x_toler: 0.4 # [m/s]
  lin_vel_y_toler: 0.2 # [m/s]
  ang_vel_yaw_toler: 0.2 # [rad/s]
   # curriculum only:
  curriculum: false
  update_rate: 0.1
  lin_vel_levels: 10
  ang_vel_levels: 10
  lin_vel_x_resolution: 0.2 # [m/s]
  lin_vel_y_resolution: 0.1 # [m/s]
  ang_vel_resolution: 0.2 # [rad/s]
  episode_length_toler: 0.1
  lin_vel_x_toler: 0.4 # [m/s]
  lin_vel_y_toler: 0.2 # [m/s]
  ang_vel_yaw_toler: 0.2 # [rad/s]

normalization:
  gravity: 1.0
  lin_vel: 1.0
  ang_vel: 1.0
  dof_pos: 1.0
  dof_vel: 0.1
  filter_weight: 0.1
  push_force: 0.1
  push_torque: 0.5
  clip_actions: 2.0
  ball_pos: 1.0

noise:
  gravity:
    range: [0., 0.01]
    operation: "additive"
    distribution: "gaussian"
  lin_vel:
    range: [0., 0.05]
    operation: "additive"
    distribution: "gaussian"
  ang_vel:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  dof_pos:
    range: [0., 0.01]
    operation: "additive"
    distribution: "gaussian"
  dof_vel:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  height:
    range: [0., 0.02]
    operation: "additive"
    distribution: "gaussian"
  ball_pos:
    range: [-0.01, 0.01]
    operation: "additive"
    distribution: "gaussian"

randomization:
  init_dof_pos:
    range: [0., 0.05]
    operation: "additive"
    distribution: "gaussian"
  init_base_pos_xy:
    range: [-1., 1.]
    operation: "additive"
    distribution: "uniform"
  init_base_lin_vel_xy:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  init_base_ang:
    range: [-0.1, 0.1]
    operation: "additive"
    distribution: "gaussian"

  ball_radius:
    range: [-0.02, 0.02]
    operation: "additive"
    distribution: "uniform"

  ball_mass:
    range: [-0.02, 0.02]
    operation: "additive"
    distribution: "uniform"
  ball_init_pos_x:
    range: [1.5, 3.0]
    operation: "additive"
    distribution: "uniform"
  ball_init_pos_y:
    range: [-1.0, 1.0]
    operation: "additive"
    distribution: "uniform"
  ball_speed:
    range: [1.5, 2.0]
    operation: "additive"
    distribution: "uniform"
  ball_angle_xy:
    range: [-0.2, 0.2]
    operation: "additive"
    distribution: "uniform"

  kick_interval_s: 2.
  kick_lin_vel:
    range: [0., 0.]
    operation: "additive"
    distribution: "gaussian"
  kick_ang_vel:
    range: [0., 0.0]
    operation: "additive"
    distribution: "gaussian"

  push_interval_s: 5.
  push_duration_s: 1.
  push_force:
    range: [0., 0.]
    operation: "additive"
    distribution: "gaussian"
  push_torque:
    range: [0., 0.]
    operation: "additive"
    distribution: "gaussian"

  dof_stiffness:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  dof_damping:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  dof_friction:
    range: [0.0, 2.0]
    operation: "additive"
    distribution: "uniform"

  friction:
    range: [0.1, 2.0]
    operation: "additive"
    distribution: "uniform"
  compliance:
    range: [0.5, 1.5]
    operation: "additive"
    distribution: "uniform"
  restitution:
    range: [0.1, 0.9]
    operation: "additive"
    distribution: "uniform"

  base_com:
    range: [-0.1, 0.1]
    operation: "additive"
    distribution: "uniform"
  base_mass:
    range: [0.8, 1.2]
    operation: "scaling"
    distribution: "uniform"
  other_com:
    range: [-0.005, 0.005]
    operation: "additive"
    distribution: "uniform"
  other_mass:
    range: [0.98, 1.02]
    operation: "scaling"
    distribution: "uniform"

rewards:
  scales:
    # === Baseline rewards (keep robot alive and stable) ===
    survival: 5.0                # Erhöht: Stabilität ist wichtiger als nur Nähe zum Ball
    base_height: -8.0            # Reduziert: Erlaubt tiefere Abwehrhaltung
    orientation: -4.0            # Leicht reduziert: Balance mit anderen Zielen
    
    # === Regularization (smooth movement) ===
    torques: -5.e-4              # Verstärkt: Effizienter Energieverbrauch
    power: -2.e-3                # Verstärkt: Verhindert übermäßige Kraftanwendung
    lin_vel_z: -2.0              # Verstärkt: Verhindert Springen
    ang_vel_xy: -0.5             # Verstärkt: Reduziert Wackeln
    dof_vel: -5.e-4              # Verstärkt: Glattere Gelenkbewegungen
    dof_acc: -2.e-7              # Verstärkt: Sanftere Bewegungen
    root_acc: -2.e-5             # Verstärkt: Stabilerer Rumpf
    action_rate: -0.8            # Verstärkt: Glattere Aktionsübergänge
    dof_pos_limits: -2.0         # Verstärkt: Vermeide Gelenkgrenzen
    collision: -2.0              # Verstärkt: Vermeide Selbstkollisionen
    feet_slip: -0.5              # Verstärkt: Besserer Bodenkontakt
    feet_distance: -1.5          # Leicht reduziert: Weniger dominant
    
    # === MAIN GOAL: Block ball (DON'T let it pass!) ===
    ball_passed_robot: -100.0    # Erhöht: Kritisches Versagen (Torwart-Hauptziel!)
    goalkeeper_pos: 2.0          # NEU: Belohnt Nähe zum theoretischen Intercept-Punkt (statt Ball)
    ball_distance: 0.0           # Deaktiviert: "Jagd" ist nicht gewünscht, nur Intercept!
    facing_ball: 2.0             # Erhöht: Wichtiger für gute Positionierung
    touched_ball: 3.0            # Reduziert: Jetzt ergänzend zu directional_return
    blocked_ball: 80.0           # Erhöht: Hauptziel - Ball erfolgreich blockiert!
    
    # === NEW: Fix specific behavior problems ===
    ball_between_legs: -20.0     # Penalty: Verhindert "Verhaken" / Ball einklemmen
    still_stance: 5.0            # Reward: Belohnt ruhiges Stehen AM Intercept-Punkt!
    ball_lateral_vel: -2.0       # Penalty: Bestraft seitliches Wegrollen (soll gerade zurück!)
    ball_forward_vel: 5.0        # Reward: Belohnt Geschwindigkeit nach vorne (aktiver Schuss)

    # === SIDE GOAL: Shoot ball back (positive X direction) ===
    ball_shot_back: 50.0         # Erhöht: Belohnung für aktives Zurückschießen
    directional_return: 8.0      # NEW: Dense reward for forward velocity after contact (time-windowed)
    soft_rebound_penalty: -5.0   # NEW: Penalty for weak/dead rebounds after contact
    
    # === Disabled ===
    tracking_lin_vel_x: 0.
    tracking_lin_vel_y: 0.
    tracking_ang_vel: 0.
    torque_tiredness: 0.
    dof_vel_limits: 0.
    torque_limits: 0.
    feet_yaw_diff: 0.
    feet_yaw_mean: 0.
    feet_roll: 0.
    waiting: 0.

  episode_length_s: 6.0           # Short episode for blocking task
  terminate_height: 0.30
  terminate_lin_vel: 10.0  # Linear velocity limit in m/s
  terminate_ang_vel: 20.0  # Angular velocity limit in rad/s
  terminate_contacts_on: []
  penalize_contacts_on: ["Trunk", "H1", "H2", "AL", "AR", "Waist", "Hip", "Shank", "Ankle"]
  only_positive_rewards: false # if true negative total rewards are clipped at zero (avoids early termination problems)
  tracking_sigma: 0.25 # tracking reward = exp(-error^2/sigma)
  base_height_target: 0.54
  soft_dof_pos_limit: 0.9 # percentage of urdf limits, values above this limit are penalized
  soft_dof_vel_limit: 1.
  soft_torque_limit: 1.
  swing_period: 0.2
  feet_distance_ref: 0.192
  # Ball termination settings
  max_ball_still_time_s: 3.0      # Terminate if ball is still for 3s (should be kicked by then)
  max_ball_moving_time_s: 5.0     # Terminate if ball keeps moving for 5s (something went wrong)
  ball_passed_terminate: true     # Terminate if ball passes behind robot (goalkeeper failed)
  shot_back_terminate: true       # Terminate on successful shot back (success!)
  shot_back_min_speed: 0.8        # Minimum ball speed for successful shot back
  touch_ball_distance_threshold: 0.15
  
  # Time-windowed return reward settings
  return_time_window_s: 0.5       # Time window after contact for directional return reward
  soft_rebound_window_s: 0.3      # Time window to check for soft rebounds after contact
  soft_rebound_min_speed: 0.3     # Below this speed = soft rebound (penalty)
  ball_stationary_speed_threshold: 0.1  # Below this = ball is stationary
